<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="visor">
        <div class="operation"></div>
        <div class="result"></div>
      </div>
      <div class="keyboard">
        <button class="backspace">CE</button>
        <button class="clear">C</button>
        <button class="btn-operation">&divide;</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="btn-operation">&times;</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="btn-operation">-</button>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="btn-operation">+</button>
        <button class="zero">0</button>
        <button>,</button>
        <button class="btn-equal">=</button>
      </div>
    </div>
  </body>
</html>
